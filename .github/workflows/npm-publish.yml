# Build, test, and publish to GitHub Packages on release (or manual dispatch).
#
# Registry: GitHub Packages (npm.pkg.github.com)
#   Package name published as: @nberardi/scrypted-aprilaire
#   Auth: GITHUB_TOKEN (packages:write) — no npmjs OTP or NPM_TOKEN secret.
#
# npmjs.org (scrypted-aprilaire) is published locally when needed:
#   npm run prepublishOnly && npm publish --access=public --otp=<code>
#
# Install from GitHub Packages:
#   .npmrc → @nberardi:registry=https://npm.pkg.github.com
#   npm install @nberardi/scrypted-aprilaire

name: npm publish

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production webpack bundle
        run: npm run prepublishOnly

      - name: Verify plugin artifact
        run: |
          test -f dist/plugin.zip
          ls -la dist/
          node -e "const p=require('./package.json'); console.log('version', p.version, 'name', p.name)"

  publish-github-packages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@nberardi'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production webpack bundle
        run: npm run prepublishOnly

      # GitHub Packages requires a scoped package name (@owner/name).
      # Keep package.json as scrypted-aprilaire for local npmjs publishes; only
      # rename for this job so Scrypted/npmjs naming stays unchanged in the repo.
      - name: Scope package name for GitHub Packages
        run: |
          npm pkg set name=@nberardi/scrypted-aprilaire
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          node -e "console.log(require('./package.json').name)"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
